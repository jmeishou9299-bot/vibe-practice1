<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 MBTI와 성현의 명언</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <h1>📜 옛 성현이 나에게 해주는 조언은?</h1>
            <p>12개의 간단한 질문에 답하고,<br>나의 MBTI와 나에게 딱 맞는 명언을 알아보아요!</p>
            <button onclick="startTest()">테스트 시작하기</button>
        </div>

        <div id="question-screen" class="screen">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <h2 id="question-text">질문이 여기에 나옵니다.</h2>
            <div class="options">
                <button id="option-a" class="btn-option" onclick="selectOption('A')">선택지 A</button>
                <button id="option-b" class="btn-option" onclick="selectOption('B')">선택지 B</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2>나의 성향은 <span id="mbti-result"></span> 입니다!</h2>
            <div class="quote-box">
                <h3 id="sage-name">성현 이름</h3>
                <p id="sage-quote" class="quote">"명언이 여기에 나옵니다."</p>
                <p id="quote-desc" class="desc">명언 설명이 여기에 나옵니다.</p>
            </div>
            <button onclick="restartTest()">다시 해보기</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
